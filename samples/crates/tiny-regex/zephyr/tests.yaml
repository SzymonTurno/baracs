sample:
  description: Demonstrates tiny-regex pattern matching on Zephyr
  name: tiny-regex zephyr sample
common:
  harness: console
  harness_config:
    type: multi_line
    ordered: true
    regex:
      - "digits: 3\\.\\.6"
      - "no-digits: none"
      - "pathological without memo: none"
      - "pathological with memo: 33\\.\\.34"
  tags: rust tiny-regex
  filter: CONFIG_RUST_SUPPORTED
  platform_allow:
    - qemu_cortex_m0
    - qemu_cortex_m3
    - qemu_riscv32
    - qemu_riscv64
tests:
  sample.tiny_regex.zephyr:
    tags: regex embedded
