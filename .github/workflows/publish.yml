name: Publish

on:
  push:
    tags:
      - "*-v*"

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Extract crate name and version
        run: |
          echo "CRATE=${GITHUB_REF_NAME%-v*}" >> $GITHUB_ENV
          echo "TAG_VERSION=${GITHUB_REF_NAME##*-v}" >> $GITHUB_ENV
      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r ".packages[] | select(.name == \"$CRATE\") | .version")
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version $TAG_VERSION != Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
      - run: cargo publish --package ${{ env.CRATE }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
